<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Log Editor | Rat Fighter</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: var(--gold-light);
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            background: var(--surface-light);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 4px;
            font-family: inherit;
        }
        textarea {
            height: 400px;
            resize: vertical;
        }
        .preview-pane {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            overflow-y: auto;
            max-height: 800px;
        }
        .helper-box {
            margin-top: 20px;
            padding: 15px;
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        .helper-grid {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            align-items: end;
        }
        #generated-output {
            margin-top: 20px;
            white-space: pre-wrap;
            background: #000;
            padding: 20px;
            border: 1px solid var(--gold);
            display: none;
        }
        
        /* Markdown Preview Styling */
        .preview-content h1, .preview-content h2, .preview-content h3 { border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .preview-content blockquote { border-left: 4px solid var(--gold); padding-left: 15px; font-style: italic; color: var(--text-muted); }
        .preview-content img { max-width: 100%; border-radius: 8px; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="site-nav"></div>

    <main>
        <section class="section">
            <div class="kicker">Creator Tools</div>
            <h2>New Dev Log Entry</h2>
            
            <div class="editor-container">
                <div class="editor-form">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="log-title" placeholder="e.g. Engine Chosen – The Road Ahead">
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="text" id="log-date" placeholder="DD/MM/YYYY">
                    </div>
                    <div class="form-group">
                        <label>Kicker (Log #)</label>
                        <input type="text" id="log-kicker" placeholder="e.g. Development Log #001">
                    </div>
                    <div class="form-group">
                        <label>Version</label>
                        <input type="text" id="log-version" placeholder="e.g. v0.0.1">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" id="log-category" placeholder="e.g. Programming">
                    </div>
                    <div class="form-group">
                        <label>Tags (Comma separated)</label>
                        <input type="text" id="log-tags" placeholder="e.g. Godot, AI, Engine Choice">
                    </div>
                    <div class="form-group">
                        <label>Content (Markdown)</label>
                        <textarea id="log-content" placeholder="Write your dev log here..."></textarea>
                    </div>

                    <div class="helper-box">
                        <label>Image Helper</label>
                        <div class="helper-grid">
                            <div>
                                <small>Path</small>
                                <input type="text" id="img-path" placeholder="images/devlogs/test.png">
                            </div>
                            <div>
                                <small>Alt Text</small>
                                <input type="text" id="img-alt" placeholder="Description">
                            </div>
                            <button class="button" onclick="insertImage()">Insert</button>
                        </div>
                    </div>

                    <div class="button-row">
                        <button class="button" onclick="generateMarkdown()">Generate Markdown</button>
                        <button class="button secondary" onclick="downloadMarkdown()">Download .md</button>
                    </div>
                </div>

                <div class="preview-pane">
                    <div class="kicker">Live Preview</div>
                    <div id="preview-area" class="preview-content">
                        <!-- Preview rendered here -->
                    </div>
                </div>
            </div>

            <div id="generated-output"></div>
        </section>
    </main>

    <div id="site-footer"></div>

    <script src="js/main.js"></script>
    <!-- Using a simple markdown parser for preview -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Set default date
        const today = new Date();
        document.getElementById('log-date').value = today.toLocaleDateString('en-GB');

        const contentArea = document.getElementById('log-content');
        const previewArea = document.getElementById('preview-area');

        function updatePreview() {
            const content = contentArea.value;
            previewArea.innerHTML = marked.parse(content);
        }

        contentArea.addEventListener('input', updatePreview);

        function insertImage() {
            const path = document.getElementById('img-path').value;
            const alt = document.getElementById('img-alt').value;
            if(!path) return;
            const md = `![${alt}](${path})\n`;
            
            const start = contentArea.selectionStart;
            const end = contentArea.selectionEnd;
            const text = contentArea.value;
            contentArea.value = text.substring(0, start) + md + text.substring(end);
            updatePreview();
        }

        function buildFullMarkdown() {
            const meta = {
                title: document.getElementById('log-title').value,
                date: document.getElementById('log-date').value,
                kicker: document.getElementById('log-kicker').value,
                version: document.getElementById('log-version').value,
                category: document.getElementById('log-category').value,
                tags: document.getElementById('log-tags').value
            };

            return `---
title: ${meta.title}
date: ${meta.date}
kicker: ${meta.kicker}
version: ${meta.version}
category: ${meta.category}
tags: ${meta.tags}
---

${contentArea.value}`;
        }

        function generateMarkdown() {
            const fullMd = buildFullMarkdown();
            const output = document.getElementById('generated-output');
            output.textContent = fullMd;
            output.style.display = 'block';
            output.scrollIntoView({ behavior: 'smooth' });
        }

        function downloadMarkdown() {
            const fullMd = buildFullMarkdown();
            const title = document.getElementById('log-title').value || 'new-log';
            const filename = title.toLowerCase().replace(/[^a-z0-9]+/g, '-') + '.md';
            
            const blob = new Blob([fullMd], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
